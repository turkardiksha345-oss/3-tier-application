name: EKS Infra + App Deployment

on:
  push:
    branches:
      - main

env:
  AWS_REGION: eu-north-1
  CLUSTER_NAME: my-cluster

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:

    # 1. Checkout
    - uses: actions/checkout@v4

    # 2. AWS Login
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_OIDC_ROLE }}
        aws-region: ${{ env.AWS_REGION }}

    # 3. Terraform Setup
    - uses: hashicorp/setup-terraform@v3

    # 4. Terraform Init
    - run: terraform init
      working-directory: Terraform-eks

    # 5. Terraform Apply
    - run: terraform apply -auto-approve
      working-directory: Terraform-eks

    # 6. Get Outputs
    - name: Get IAM Outputs
      run: |
        echo "ALBC_ROLE=$(terraform output -raw albc_iam_role_arn)" >> $GITHUB_ENV
        echo "KARPENTER_ROLE=$(terraform output -raw karpenter_iam_role_arn)" >> $GITHUB_ENV
        echo "KARPENTER_QUEUE=$(terraform output -raw karpenter_queue_name)" >> $GITHUB_ENV
      working-directory: Terraform-eks

    # 7. Docker Login
    - run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    # 8. Build Images
    - name: Build Backend
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/easy-crud-backend:latest ./Application/backend
        docker push ${{ secrets.DOCKER_USERNAME }}/easy-crud-backend:latest

    - name: Build Frontend
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/easy-crud-frontend:latest ./Application/frontend
        docker push ${{ secrets.DOCKER_USERNAME }}/easy-crud-frontend:latest

    # 9. Install kubectl
    - run: |
        curl -o kubectl https://s3.us-west-2.amazonaws.com/amazon-eks/1.29.0/2024-01-04/bin/linux/amd64/kubectl
        chmod +x kubectl
        sudo mv kubectl /usr/local/bin/

    # 10. Connect to EKS
    - run: aws eks update-kubeconfig --region $AWS_REGION --name $CLUSTER_NAME

    # 11. Wait for Nodes
    - name: Wait for Nodes
      run: |
        for i in {1..60}; do
          READY=$(kubectl get nodes --no-headers 2>/dev/null | grep -c " Ready")
          if [ "$READY" -ge 1 ]; then
            kubectl get nodes
            break
          fi
          sleep 10
        done

    # 12. Install Helm
    - uses: azure/setup-helm@v4

    # 13. Install ALB Controller (Stable)
    - name: Install ALB Controller
      run: |
        helm repo add eks https://aws.github.io/eks-charts
        helm repo update

        VPC_ID=$(aws eks describe-cluster \
          --name $CLUSTER_NAME \
          --region $AWS_REGION \
          --query "cluster.resourcesVpcConfig.vpcId" \
          --output text)

        helm upgrade --install aws-load-balancer-controller eks/aws-load-balancer-controller \
          -n kube-system \
          --set clusterName=$CLUSTER_NAME \
          --set serviceAccount.create=false \
          --set serviceAccount.name=aws-load-balancer-controller \
          --set region=$AWS_REGION \
          --set vpcId=$VPC_ID

        kubectl rollout status deployment/aws-load-balancer-controller -n kube-system --timeout=300s

        for i in {1..30}; do
          EP=$(kubectl get endpoints aws-load-balancer-webhook-service -n kube-system -o jsonpath='{.subsets}' || echo "")
          if [ ! -z "$EP" ]; then
            break
          fi
          sleep 10
        done

    # 14. Delay (critical)
    - run: sleep 30

    # 15. Create Karpenter SA
    - run: |
        kubectl apply -f - <<EOF
        apiVersion: v1
        kind: ServiceAccount
        metadata:
          name: karpenter
          namespace: kube-system
          annotations:
            eks.amazonaws.com/role-arn: ${KARPENTER_ROLE}
        EOF

    # 16. Install Karpenter
    - run: |
        aws ecr-public get-login-password --region us-east-1 | helm registry login --username AWS --password-stdin public.ecr.aws

        helm upgrade --install karpenter oci://public.ecr.aws/karpenter/karpenter \
          --version 1.0.0 \
          --namespace kube-system \
          --set settings.clusterName=${CLUSTER_NAME} \
          --set settings.interruptionQueue=${KARPENTER_QUEUE} \
          --set serviceAccount.create=false \
          --set serviceAccount.name=karpenter

        kubectl rollout status deployment/karpenter -n kube-system --timeout=300s

    # 17. Install KEDA
    - run: |
        helm repo add kedacore https://kedacore.github.io/charts
        helm repo update
        helm upgrade --install keda kedacore/keda --namespace keda --create-namespace

    # 18. Install ArgoCD
    - run: |
        kubectl create namespace argocd || true
        kubectl apply -n argocd -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
        kubectl wait --for=condition=Available deployment/argocd-server -n argocd --timeout=300s

    # 19. Expose ArgoCD
    - run: |
        kubectl patch svc argocd-server -n argocd -p '{"spec": {"type": "LoadBalancer"}}'
        sleep 30
        kubectl get svc argocd-server -n argocd

    # 20. Deploy via ArgoCD
    - run: kubectl apply -f argocd/